<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AVENTA — Cazar oferta</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 280px;
      margin: 0;
      padding: 14px 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 14px;
      color: #1d1d1f;
      background: #fff;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 600;
      color: #1d1d1f;
    }
    p {
      margin: 0 0 14px;
      color: #6e6e73;
      line-height: 1.4;
    }
    button {
      width: 100%;
      padding: 10px 14px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(to bottom, #7c3aed, #6d28d9);
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    button:hover { opacity: 0.95; }
    button:active { transform: scale(0.98); }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    .error {
      margin-top: 10px;
      font-size: 12px;
      color: #dc2626;
    }
  </style>
</head>
<body>
  <h1>AVENTA</h1>
  <p>Envía esta oferta a AVENTA para compartirla con la comunidad.</p>
  <button id="cazar">Cazar oferta en Aventa</button>
  <p id="error" class="error" style="display: none;"></p>
  <script src="popup.js"></script>
</body>
</html>
