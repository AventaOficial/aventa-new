name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci_dummy_anon_key
      SUPABASE_SERVICE_ROLE_KEY: ci_dummy_service_role_key
      DIGEST_TIMEZONE: America/Mexico_City
      NEXT_PUBLIC_APP_URL: https://aventaofertas.com

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Contract gate + build
        run: npm run ci:verify
